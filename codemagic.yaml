workflows:
  paz_castanhal_ios:
    name: Paz Castanhal - iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      groups:
        - pazcastanhal # Nome do grupo onde você salvou as variáveis da Apple no Codemagic
      flutter: stable
      xcode: latest
      cocoapods: default
      # Code Signing automático via App Store Connect API
      # ⚠️ Configure estas variáveis no Codemagic > Environment variables:
      #    - APP_STORE_CONNECT_ISSUER_ID
      #    - APP_STORE_CONNECT_KEY_IDENTIFIER
      #    - APP_STORE_CONNECT_PRIVATE_KEY
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.cocoapods
    scripts:
      - name: Configurar ambiente
        script: |
          # Gerar GoogleService-Info.plist a partir da variável de ambiente (se configurada)
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist gerado"
          else
            echo "⚠️ GOOGLE_SERVICE_INFO_PLIST não configurada - Firebase pode falhar"
          fi

      - name: Aplicar patches nos pacotes
        script: |
          flutter pub get

          # Aplica patches via Dart (usa package_config.json para localizar arquivos)
          dart run tool/patch_packages.dart

      - name: Instalar dependências do CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Fetch signing files from Apple
        script: |
          # Busca automaticamente o certificado de distribuição iOS e o perfil correspondente para o app
          app-store-connect fetch-signing-files "com.app.p1674HE" --type IOS_APP_STORE --create

      - name: Use certificates
        script: |
          keychain add-certificates

      - name: Build Flutter iOS IPA (Assinado)
        script: |
          # Compila e assina o app usando a nova versão 3.0.0
          flutter build ipa --release \
            --export-method app-store \
            --build-name=3.0.0 \
            --build-number=$(($(date +%s)))

    artifacts:
      # O próprio Flutter gera o .ipa na pasta padrão ao usar o comando 'flutter build ipa'
      - build/ios/ipa/*.ipa
    
    publishing:
      email:
        recipients:
          - renierrocha@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY # Propriedade correta ajustada aqui
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true # Envia o app assinado direto para o TestFlight
