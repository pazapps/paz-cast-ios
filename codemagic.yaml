workflows:
  paz_castanhal_android:
    name: Paz Castanhal - Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Aplicar patches nos pacotes
        script: |
          flutter pub get

          # Patch 1: quill_native_bridge_windows - GMEM_MOVEABLE → GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE
          QUILL_FILE=$(find ~/.pub-cache -path "*/quill_native_bridge_windows-*/lib/quill_native_bridge_windows.dart" 2>/dev/null | head -1)
          if [ -n "$QUILL_FILE" ]; then
            sed -i '' 's/GlobalAlloc(GMEM_MOVEABLE)/GlobalAlloc(GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE)/g' "$QUILL_FILE"
            echo "✅ Patch quill_native_bridge_windows: $QUILL_FILE"
          fi

          # Patch 2: google_fonts - const → final (FontWeight const map error)
          GOOGLE_FONTS_FILE=$(find ~/.pub-cache -path "*/google_fonts-*/lib/src/google_fonts_variant.dart" 2>/dev/null | head -1)
          if [ -n "$GOOGLE_FONTS_FILE" ]; then
            sed -i '' 's/const _fontWeightToFilenameWeightParts = {/final _fontWeightToFilenameWeightParts = {/' "$GOOGLE_FONTS_FILE"
            echo "✅ Patch google_fonts: $GOOGLE_FONTS_FILE"
          fi

          # Patch 3: flutter_quill - adicionar onFocusReceived
          QUILL_MIXIN_FILE=$(find ~/.pub-cache -path "*/flutter_quill-*/lib/src/editor/raw_editor/raw_editor_state_text_input_client_mixin.dart" 2>/dev/null | head -1)
          if [ -n "$QUILL_MIXIN_FILE" ]; then
            sed -i '' '$ s/^}/  @override\n  bool onFocusReceived() => false;\n}/' "$QUILL_MIXIN_FILE"
            echo "✅ Patch flutter_quill (onFocusReceived): $QUILL_MIXIN_FILE"
          fi

      - name: Build Android APK Release
        script: |
          flutter build apk --release \
            --build-name=1.3.2 \
            --build-number=$(($(date +%s)))
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - renierrocha@gmail.com
        notify:
          success: true
          failure: true

  paz_castanhal_ios:
    name: Paz Castanhal - iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.cocoapods
    scripts:
      - name: Aplicar patches nos pacotes
        script: |
          flutter pub get

          # Patch 1: quill_native_bridge_windows - GMEM_MOVEABLE → GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE
          QUILL_FILE=$(find ~/.pub-cache -path "*/quill_native_bridge_windows-*/lib/quill_native_bridge_windows.dart" 2>/dev/null | head -1)
          if [ -n "$QUILL_FILE" ]; then
            sed -i '' 's/GlobalAlloc(GMEM_MOVEABLE)/GlobalAlloc(GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE)/g' "$QUILL_FILE"
            echo "✅ Patch quill_native_bridge_windows: $QUILL_FILE"
          fi

          # Patch 2: google_fonts - const → final (FontWeight const map error)
          GOOGLE_FONTS_FILE=$(find ~/.pub-cache -path "*/google_fonts-*/lib/src/google_fonts_variant.dart" 2>/dev/null | head -1)
          if [ -n "$GOOGLE_FONTS_FILE" ]; then
            sed -i '' 's/const _fontWeightToFilenameWeightParts = {/final _fontWeightToFilenameWeightParts = {/' "$GOOGLE_FONTS_FILE"
            echo "✅ Patch google_fonts: $GOOGLE_FONTS_FILE"
          fi

          # Patch 3: flutter_quill - adicionar onFocusReceived
          QUILL_MIXIN_FILE=$(find ~/.pub-cache -path "*/flutter_quill-*/lib/src/editor/raw_editor/raw_editor_state_text_input_client_mixin.dart" 2>/dev/null | head -1)
          if [ -n "$QUILL_MIXIN_FILE" ]; then
            sed -i '' '$ s/^}/  @override\n  bool onFocusReceived() => false;\n}/' "$QUILL_MIXIN_FILE"
            echo "✅ Patch flutter_quill (onFocusReceived): $QUILL_MIXIN_FILE"
          fi

      - name: Instalar dependências do CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS Release (sem codesign)
        script: |
          flutter build ios --release --no-codesign \
            --build-name=1.3.2 \
            --build-number=$(($(date +%s)))

      - name: Empacotar como IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../../../build/ios/ipa/PazCastanhal.ipa Payload/
    artifacts:
      - build/ios/ipa/PazCastanhal.ipa
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - renierrocha@gmail.com
        notify:
          success: true
          failure: true
    publishing:
      email:
        recipients:
          - renierrocha@gmail.com
        notify:
          success: true
          failure: true

  paz_castanhal_ios:
    name: Paz Castanhal - iOS
    max_build_duration: 90
