workflows:
  paz_castanhal_ios:
    name: Paz Castanhal - iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # Code Signing automático via App Store Connect API
      # ⚠️ Configure estas variáveis no Codemagic > Environment variables:
      #    - APP_STORE_CONNECT_ISSUER_ID
      #    - APP_STORE_CONNECT_KEY_IDENTIFIER
      #    - APP_STORE_CONNECT_PRIVATE_KEY
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.cocoapods
    scripts:
      - name: Configurar ambiente
        script: |
          # Gerar GoogleService-Info.plist a partir da variável de ambiente (se configurada)
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist gerado"
          else
            echo "⚠️ GOOGLE_SERVICE_INFO_PLIST não configurada - Firebase pode falhar"
          fi

      - name: Aplicar patches nos pacotes
        script: |
          flutter pub get

          # Aplica patches via Dart (usa package_config.json para localizar arquivos)
          dart run tool/patch_packages.dart

      - name: Instalar dependências do CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS (release)
        script: |
          flutter build ios --release --no-codesign \
            --build-name=1.3.2 \
            --build-number=$(($(date +%s)))

      - name: Empacotar como IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "$(pwd)/PazCastanhal.ipa" Payload/
    artifacts:
      - build/ios/ipa/PazCastanhal.ipa
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - renierrocha@gmail.com
        notify:
          success: true
          failure: true
