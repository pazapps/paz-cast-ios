workflows:
  paz_castanhal_android:
    name: Paz Castanhal - Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      vars:
        GOOGLE_API_KEY: "" # Preencher no Codemagic (UI > Environment variables)
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Aplicar patches e instalar dependências
        script: |
          # Patch: quill_native_bridge_windows com win32 5.x (GMEM_MOVEABLE movido para GLOBAL_ALLOC_FLAGS)
          PATCH_FILE=$(find ~/.pub-cache ~/Library/Developer -path "*/quill_native_bridge_windows-0.0.2/lib/quill_native_bridge_windows.dart" 2>/dev/null | head -1)
          if [ -n "$PATCH_FILE" ]; then
            sed -i '' 's/GlobalAlloc(GMEM_MOVEABLE/GlobalAlloc(GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE/' "$PATCH_FILE"
            echo "Patch aplicado em: $PATCH_FILE"
          else
            echo "Arquivo do quill_native_bridge_windows não encontrado, tentando após pub get..."
          fi
          flutter pub get
          # Tentar novamente após flutter pub get, caso o arquivo seja baixado agora
          PATCH_FILE=$(find ~/.pub-cache ~/Library/Developer -path "*/quill_native_bridge_windows-0.0.2/lib/quill_native_bridge_windows.dart" 2>/dev/null | head -1)
          if [ -n "$PATCH_FILE" ]; then
            sed -i '' 's/GlobalAlloc(GMEM_MOVEABLE/GlobalAlloc(GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE/' "$PATCH_FILE"
            echo "Patch (pós pub get) aplicado em: $PATCH_FILE"
          fi

      - name: Build Android APK Release
        script: |
          flutter build apk --release \
            --build-name=1.3.2 \
            --build-number=$(($(date +%s)))
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - renierrocha@gmail.com
        notify:
          success: true
          failure: true

  paz_castanhal_ios:
    name: Paz Castanhal - iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      vars:
        GOOGLE_API_KEY: "" # Preencher no Codemagic (UI > Environment variables)
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.cocoapods
    scripts:
      - name: Aplicar patches e instalar dependências
        script: |
          # Patch: quill_native_bridge_windows com win32 5.x (GMEM_MOVEABLE movido para GLOBAL_ALLOC_FLAGS)
          PATCH_FILE=$(find ~/.pub-cache ~/Library/Developer -path "*/quill_native_bridge_windows-0.0.2/lib/quill_native_bridge_windows.dart" 2>/dev/null | head -1)
          if [ -n "$PATCH_FILE" ]; then
            sed -i '' 's/GlobalAlloc(GMEM_MOVEABLE/GlobalAlloc(GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE/' "$PATCH_FILE"
            echo "Patch aplicado em: $PATCH_FILE"
          else
            echo "Arquivo do quill_native_bridge_windows não encontrado, tentando após pub get..."
          fi
          flutter pub get
          # Tentar novamente após flutter pub get, caso o arquivo seja baixado agora
          PATCH_FILE=$(find ~/.pub-cache ~/Library/Developer -path "*/quill_native_bridge_windows-0.0.2/lib/quill_native_bridge_windows.dart" 2>/dev/null | head -1)
          if [ -n "$PATCH_FILE" ]; then
            sed -i '' 's/GlobalAlloc(GMEM_MOVEABLE/GlobalAlloc(GLOBAL_ALLOC_FLAGS.GMEM_MOVEABLE/' "$PATCH_FILE"
            echo "Patch (pós pub get) aplicado em: $PATCH_FILE"
          fi

      - name: Instalar dependências do CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS Release (sem codesign)
        script: |
          flutter build ios --release --no-codesign \
            --build-name=1.3.2 \
            --build-number=$(($(date +%s)))

      - name: Empacotar como IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../../../build/ios/ipa/PazCastanhal.ipa Payload/
    artifacts:
      - build/ios/ipa/PazCastanhal.ipa
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - renierrocha@gmail.com
        notify:
          success: true
          failure: true
